name: Build AutoCP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Generate project structure
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PKG=app/src/main/java/com/autocp/app
          mkdir -p $PKG
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p gradle/wrapper

          cp autocp.kt $PKG/

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "AutoCP"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")      version "8.9.1" apply false
              id("org.jetbrains.kotlin.android") version "2.2.0" apply false
          }
          EOF

          cat > app/build.gradle.kts << EOF
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace  = "com.autocp.app"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.autocp.app"
                  minSdk        = 26
                  targetSdk     = 36
                  versionCode   = ${BUILD_NUMBER}
                  versionName   = "${BUILD_NUMBER}"
              }

              signingConfigs {
                  create("release") {
                      storeFile     = file("dummy.keystore")
                      storePassword = "password"
                      keyAlias      = "dummy"
                      keyPassword   = "password"
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled   = false
                      isShrinkResources = false
                      signingConfig     = signingConfigs.getByName("release")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }

              buildFeatures { viewBinding = true }

              splits {
                  abi {
                      isEnable       = true
                      reset()
                      include("arm64-v8a")
                      isUniversalApk = false
                  }
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.15.0")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("com.google.android.material:material:1.12.0")
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/AppTheme"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#1E1E1E"
              android:fitsSystemWindows="true">

              <!-- Header bar -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="#2D2D2D"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="4dp"
                  android:paddingEnd="4dp"
                  android:paddingTop="2dp"
                  android:paddingBottom="2dp">

                  <Button
                      android:id="@+id/btnParts"
                      style="?attr/borderlessButtonStyle"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="PARTS"
                      android:textColor="#569CD6"
                      android:fontFamily="monospace"
                      android:textSize="13sp"
                      android:textStyle="bold"
                      android:minWidth="0dp"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp" />

                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="Auto Copy/Paste"
                      android:textColor="#CCCCCC"
                      android:fontFamily="monospace"
                      android:textSize="15sp"
                      android:textStyle="bold"
                      android:gravity="center" />

                  <Button
                      android:id="@+id/btnSelectAll"
                      style="?attr/borderlessButtonStyle"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="All"
                      android:textColor="#CCCCCC"
                      android:fontFamily="monospace"
                      android:textSize="13sp"
                      android:minWidth="0dp"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp" />

                  <Button
                      android:id="@+id/btnCopy"
                      style="?attr/borderlessButtonStyle"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Copy"
                      android:textColor="#CCCCCC"
                      android:fontFamily="monospace"
                      android:textSize="13sp"
                      android:minWidth="0dp"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp" />

                  <Button
                      android:id="@+id/btnReplace"
                      style="?attr/borderlessButtonStyle"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Replace"
                      android:textColor="#CCCCCC"
                      android:fontFamily="monospace"
                      android:textSize="13sp"
                      android:minWidth="0dp"
                      android:paddingStart="8dp"
                      android:paddingEnd="8dp" />

              </LinearLayout>

              <!-- Code editor: ScrollView (vertical) > HorizontalScrollView > EditText -->
              <ScrollView
                  android:id="@+id/scrollView"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:background="#1E1E1E"
                  android:scrollbars="vertical">

                  <HorizontalScrollView
                      android:id="@+id/horizontalScrollView"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:scrollbars="horizontal"
                      android:fillViewport="false">

                      <EditText
                          android:id="@+id/editCode"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:background="@null"
                          android:textColor="#FFFFFF"
                          android:textColorHint="#555555"
                          android:hint="Paste your code here..."
                          android:fontFamily="monospace"
                          android:textSize="14sp"
                          android:lineSpacingExtra="2sp"
                          android:gravity="top|start"
                          android:inputType="textMultiLine|textNoSuggestions"
                          android:imeOptions="flagNoExtractUi"
                          android:includeFontPadding="false"
                          android:minLines="30"
                          android:padding="12dp"
                          android:scrollbars="none" />

                  </HorizontalScrollView>

              </ScrollView>

          </LinearLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">AutoCP</string></resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>

              <style name="AppTheme" parent="Theme.MaterialComponents.NoActionBar">
                  <item name="android:windowBackground">#1E1E1E</item>
                  <item name="android:statusBarColor">#1E1E1E</item>
                  <item name="android:navigationBarColor">#1E1E1E</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="colorPrimary">#569CD6</item>
                  <item name="colorPrimaryVariant">#2D2D2D</item>
                  <item name="colorOnPrimary">#FFFFFF</item>
                  <item name="colorSurface">#2D2D2D</item>
                  <item name="colorOnSurface">#FFFFFF</item>
                  <item name="android:colorBackground">#1E1E1E</item>
              </style>

              <!-- Dark theme overlay for MaterialAlertDialogBuilder -->
              <style name="DarkAlertDialog" parent="ThemeOverlay.MaterialComponents.MaterialAlertDialog">
                  <item name="colorSurface">#2D2D2D</item>
                  <item name="colorOnSurface">#FFFFFF</item>
                  <item name="colorPrimary">#4CAF50</item>
                  <item name="android:textColorPrimary">#FFFFFF</item>
                  <item name="android:textColorSecondary">#AAAAAA</item>
              </style>

          </resources>
          EOF

      - name: Generate dummy keystore
        run: |
          keytool -genkey -v \
            -keystore app/dummy.keystore \
            -alias dummy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password \
            -keypass password \
            -dname "CN=Dummy, OU=AutoCP, O=AutoCP, L=Test, S=Test, C=US"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pillow-v1

      - name: Generate launcher icons
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          def make_icon(size):
              BG    = (128, 128, 128, 255)
              WHITE = (255, 255, 255, 255)
              img   = Image.new('RGBA', (size, size), BG)
              d     = ImageDraw.Draw(img)
              text  = "ACP"
              font_size = int(size * 0.45)
              try:
                  font_paths = [
                      "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                      "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf",
                      "/usr/share/fonts/truetype/freefont/FreeSansBold.ttf",
                      "/usr/share/fonts/TTF/DejaVuSans-Bold.ttf",
                  ]
                  font = None
                  for fp in font_paths:
                      if os.path.exists(fp):
                          font = ImageFont.truetype(fp, font_size)
                          break
                  if font is None:
                      font = ImageFont.load_default()
              except:
                  font = ImageFont.load_default()
              bbox   = d.textbbox((0, 0), text, font=font)
              text_w = bbox[2] - bbox[0]
              text_h = bbox[3] - bbox[1]
              x = (size - text_w) / 2 - bbox[0]
              y = (size - text_h) / 2 - bbox[1]
              d.text((x, y), text, fill=WHITE, font=font)
              return img

          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for density, s in sizes.items():
              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(s)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')
          print("Icons done.")
          PYEOF

      - name: Create Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK
        run: |
          APK_PATH="app/build/outputs/apk/release/app-arm64-v8a-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
          else
              echo "❌ Release APK not found"
              exit 1
          fi

      - name: Bundle release
        run: |
          mkdir -p AutoCP-release/.github/workflows
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk AutoCP-release/AutoCP.apk
          cp autocp.kt AutoCP-release/
          cp .github/workflows/build.yml AutoCP-release/.github/workflows/

          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-arm64-v8a-release.apk | awk '{print $5}')

          cat > AutoCP-release/BUILD_INFO.txt << EOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          APK Size:   $APK_SIZE
          Minified:   No
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoCP-${{ github.run_number }}
          path: AutoCP-release/
          retention-days: 30
